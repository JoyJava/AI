<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X Scraper</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --primary: #38bdf8;
            --primary-hover: #0ea5e9;
            --danger: #f43f5e;
            --danger-hover: #e11d48;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            width: 320px;
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #020617 0%, #0f172a 100%);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .header {
            text-align: center;
            margin-bottom: 8px;
        }

        .header h1 {
            margin: 0;
            font-size: 20px;
            font-weight: 700;
            background: -webkit-linear-gradient(45deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            margin: 4px 0 0;
            font-size: 12px;
            color: #94a3b8;
        }

        .stats-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .stat-value {
            font-size: 32px;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 4px;
            color: var(--primary);
        }

        .stat-label {
            font-size: 12px;
            color: #cbd5e1;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-badge {
            margin-top: 12px;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            background: rgba(148, 163, 184, 0.1);
            color: #94a3b8;
            border: 1px solid rgba(148, 163, 184, 0.2);
            transition: all 0.3s ease;
        }

        .status-badge.active {
            background: rgba(56, 189, 248, 0.1);
            color: #38bdf8;
            border-color: rgba(56, 189, 248, 0.3);
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.2);
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        button {
            border: none;
            outline: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: white;
        }

        .btn-primary {
            background: var(--primary);
            box-shadow: 0 4px 12px rgba(56, 189, 248, 0.3);
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-primary:active {
            transform: translateY(1px);
        }

        .btn-danger {
            background: var(--danger);
            box-shadow: 0 4px 12px rgba(244, 63, 94, 0.3);
        }

        .btn-danger:hover {
            background: var(--danger-hover);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: #cbd5e1;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .input-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 8px 12px;
        }

        .input-group label {
            font-size: 13px;
            color: #cbd5e1;
        }

        .input-group input {
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            width: 50px;
            text-align: center;
            font-size: 13px;
            outline: none;
        }
        .input-group input:focus {
            border-color: var(--primary);
        }

        .error-msg {
            display: none;
            color: var(--danger);
            font-size: 12px;
            text-align: center;
            margin-top: -4px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>X Scraper Pro</h1>
        <p>全自动推文智能抓取</p>
    </div>

    <div class="stats-panel">
        <div class="stat-value" id="countDisplay">0</div>
        <div class="stat-label">已抓取有效推文</div>
        <div class="status-badge" id="statusBadge">待命休眠中</div>
    </div>

    <div class="input-group">
        <label for="hoursInput">抓取时间范围 (小时)</label>
        <input type="number" id="hoursInput" value="48" min="1" max="720">
    </div>

    <div class="error-msg" id="errorMsg">请在 X (Twitter) 页面使用此插件</div>

    <div class="controls">
        <button id="startBtn" class="btn-primary">▶️ 开始自动抓取</button>
        <button id="stopBtn" class="btn-danger" style="display: none;">⏹️ 停止并保存导出</button>
        <button id="clearBtn" class="btn-secondary">🗑️ 清除本地缓存</button>
    </div>

    <script src="popup.js"></script>
</body>
</html>
